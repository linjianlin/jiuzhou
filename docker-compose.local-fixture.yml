services:
  postgres:
    image: postgres:16-alpine
    container_name: jiuzhou-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jiuzhou
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jiuzhou"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - jiuzhou_local_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jiuzhou-local-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - jiuzhou_local_redis:/data

volumes:
  jiuzhou_local_postgres:
  jiuzhou_local_redis:
